<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>เข้าสู่ระบบ · SMC Trading Academy</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --reaper: #4f46e5;
    --ninja: #0d9488;
    --sky: #0284c7;
    --grad: linear-gradient(135deg, #4f46e5 0%, #0d9488 50%, #0284c7 100%);
    --ink: #0f172a;
    --ink-2: #475569;
    --muted: #94a3b8;
    --line: #e2e8f0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    font-family: 'IBM Plex Sans Thai', 'Outfit', system-ui, sans-serif;
    color: var(--ink);
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
    background:
      radial-gradient(900px 500px at 15% -10%, #eef2ff 0%, transparent 55%),
      radial-gradient(900px 500px at 110% 110%, #ecfeff 0%, transparent 55%),
      #f8fafc;
  }
  /* faint chart-paper grid, like the SMC slides */
  body::before {
    content: ""; position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      linear-gradient(#0f172a08 1px, transparent 1px),
      linear-gradient(90deg, #0f172a08 1px, transparent 1px);
    background-size: 28px 28px;
    mask-image: radial-gradient(circle at 50% 40%, #000 0%, transparent 75%);
  }
  .card {
    position: relative; z-index: 1;
    width: 100%; max-width: 400px;
    background: #ffffff;
    border: 1px solid var(--line);
    border-radius: 22px;
    padding: 40px 34px 30px;
    box-shadow: 0 24px 60px -24px #1e293b40, 0 2px 6px #0f172a0a;
  }
  .brand { text-align: center; margin-bottom: 26px; }
  .logo {
    width: 60px; height: 60px; border-radius: 16px;
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--ink);
    box-shadow: 0 10px 24px -10px #4f46e588;
    margin-bottom: 16px;
  }
  .logo svg { width: 34px; height: 34px; }
  h1 {
    font-family: 'Outfit', sans-serif; font-weight: 800;
    font-size: 22px; letter-spacing: -0.01em;
    background: var(--grad); -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .sub { color: var(--ink-2); font-size: 14px; margin-top: 6px; font-weight: 500; }
  form { margin-top: 4px; }
  .field { margin-bottom: 16px; }
  label { display: block; font-size: 13px; font-weight: 600; color: var(--ink-2); margin-bottom: 7px; }
  input {
    width: 100%; height: 48px; padding: 0 15px;
    font-family: inherit; font-size: 15px; color: var(--ink);
    background: #f8fafc; border: 1.5px solid var(--line); border-radius: 12px;
    transition: border-color .15s, box-shadow .15s, background .15s;
  }
  input:focus {
    outline: none; background: #fff;
    border-color: var(--reaper);
    box-shadow: 0 0 0 4px #4f46e51f;
  }
  .btn {
    width: 100%; height: 50px; margin-top: 6px;
    font-family: 'Outfit','IBM Plex Sans Thai',sans-serif; font-weight: 700; font-size: 15.5px;
    color: #fff; letter-spacing: .01em; cursor: pointer;
    background: var(--grad); border: none; border-radius: 12px;
    box-shadow: 0 12px 26px -12px #4f46e5aa;
    transition: transform .12s, box-shadow .12s, opacity .12s;
  }
  .btn:hover { transform: translateY(-1px); box-shadow: 0 16px 30px -12px #4f46e5cc; }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: .6; cursor: default; transform: none; }
  .err {
    min-height: 20px; margin: 14px 2px 0; text-align: center;
    font-size: 13px; font-weight: 600; color: #dc2626;
  }
  .foot { margin-top: 18px; text-align: center; font-size: 12px; color: var(--muted); }
</style>
</head>
<body>
  <main class="card">
    <div class="brand">
      <div class="logo">
        <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
          <polyline points="5,22 12,15 18,19 27,7" fill="none" stroke="#2dd4bf"
                    stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          <polyline points="20,7 27,7 27,14" fill="none" stroke="#818cf8"
                    stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h1>SMC Trading Academy</h1>
      <div class="sub">เข้าสู่ระบบสมาชิก</div>
    </div>

    <form id="loginForm" autocomplete="on">
      <div class="field">
        <label for="u">ชื่อผู้ใช้</label>
        <input id="u" name="username" type="text" autocomplete="username"
               autocapitalize="none" autocorrect="off" spellcheck="false" required>
      </div>
      <div class="field">
        <label for="p">รหัสผ่าน</label>
        <input id="p" name="password" type="password" autocomplete="current-password" required>
      </div>
      <button id="btn" class="btn" type="submit">เข้าสู่ระบบ</button>
      <div id="err" class="err" role="alert"></div>
    </form>

    <div class="foot">สำหรับสมาชิกเท่านั้น · SMC Trading Academy &amp; Hub</div>
  </main>

<script>
(function () {
  var form = document.getElementById('loginForm');
  var err  = document.getElementById('err');
  var btn  = document.getElementById('btn');

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    var u = document.getElementById('u').value.trim();
    var p = document.getElementById('p').value;
    if (!u || !p) { return; }

    err.textContent = '';
    btn.disabled = true;
    btn.textContent = 'กำลังเข้าสู่ระบบ…';

    // XHR with user/pass primes the browser's HTTP-auth credential cache for the
    // realm, so subsequent navigation + PDF iframe loads carry the credentials
    // automatically (no native popup). nginx still enforces Basic Auth server-side.
    var xhr = new XMLHttpRequest();
    xhr.open('GET', '/auth-check?ts=' + Date.now(), true, u, p);
    xhr.onload = function () {
      // success = 204 from /auth-check; wrong creds get redirected to login.html (200)
      if (xhr.status === 204 && xhr.responseURL.indexOf('/login.html') === -1) {
        window.location.replace('/');
      } else {
        fail('ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง');
      }
    };
    xhr.onerror = function () { fail('เชื่อมต่อไม่ได้ ลองใหม่อีกครั้ง'); };
    xhr.send();

    function fail(msg) {
      err.textContent = msg;
      btn.disabled = false;
      btn.textContent = 'เข้าสู่ระบบ';
      document.getElementById('p').value = '';
      document.getElementById('p').focus();
    }
  });
})();
</script>
</body>
</html>

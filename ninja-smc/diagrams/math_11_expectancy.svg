<svg viewBox='0 0 960 500' xmlns='http://www.w3.org/2000/svg'><rect width='960' height='500' fill='#ffffff'/><line x1='0' y1='80' x2='0' y2='500' stroke='#f3f6fa'/><line x1='48' y1='80' x2='48' y2='500' stroke='#f3f6fa'/><line x1='96' y1='80' x2='96' y2='500' stroke='#f3f6fa'/><line x1='144' y1='80' x2='144' y2='500' stroke='#f3f6fa'/><line x1='192' y1='80' x2='192' y2='500' stroke='#f3f6fa'/><line x1='240' y1='80' x2='240' y2='500' stroke='#f3f6fa'/><line x1='288' y1='80' x2='288' y2='500' stroke='#f3f6fa'/><line x1='336' y1='80' x2='336' y2='500' stroke='#f3f6fa'/><line x1='384' y1='80' x2='384' y2='500' stroke='#f3f6fa'/><line x1='432' y1='80' x2='432' y2='500' stroke='#f3f6fa'/><line x1='480' y1='80' x2='480' y2='500' stroke='#f3f6fa'/><line x1='528' y1='80' x2='528' y2='500' stroke='#f3f6fa'/><line x1='576' y1='80' x2='576' y2='500' stroke='#f3f6fa'/><line x1='624' y1='80' x2='624' y2='500' stroke='#f3f6fa'/><line x1='672' y1='80' x2='672' y2='500' stroke='#f3f6fa'/><line x1='720' y1='80' x2='720' y2='500' stroke='#f3f6fa'/><line x1='768' y1='80' x2='768' y2='500' stroke='#f3f6fa'/><line x1='816' y1='80' x2='816' y2='500' stroke='#f3f6fa'/><line x1='864' y1='80' x2='864' y2='500' stroke='#f3f6fa'/><line x1='912' y1='80' x2='912' y2='500' stroke='#f3f6fa'/><line x1='960' y1='80' x2='960' y2='500' stroke='#f3f6fa'/><line x1='0' y1='96' x2='960' y2='96' stroke='#f3f6fa'/><line x1='0' y1='144' x2='960' y2='144' stroke='#f3f6fa'/><line x1='0' y1='192' x2='960' y2='192' stroke='#f3f6fa'/><line x1='0' y1='240' x2='960' y2='240' stroke='#f3f6fa'/><line x1='0' y1='288' x2='960' y2='288' stroke='#f3f6fa'/><line x1='0' y1='336' x2='960' y2='336' stroke='#f3f6fa'/><line x1='0' y1='384' x2='960' y2='384' stroke='#f3f6fa'/><line x1='0' y1='432' x2='960' y2='432' stroke='#f3f6fa'/><line x1='0' y1='480' x2='960' y2='480' stroke='#f3f6fa'/><rect x='0' y='0' width='960' height='72' fill='#f8fafc'/><rect x='0' y='0' width='6' height='72' fill='#4f46e5'/><text x='28' y='34' font-family='IBM Plex Sans Thai, Outfit, Segoe UI, sans-serif' font-size='25' font-weight='700' fill='#0f172a' text-anchor='start'>Expectancy &amp; R-Multiple: หัวใจของความได้เปรียบ</text><text x='28' y='58' font-family='IBM Plex Sans Thai, Outfit, Segoe UI, sans-serif' font-size='14' fill='#64748b' text-anchor='start'>ตัวอย่าง Win 40% · Reward 3,000 · Risk 1,000 = +600/ไม้</text><line x1='0' y1='72' x2='960' y2='72' stroke='#e2e8f0'/><rect x='60' y='100' width='840' height='52' rx='12' fill='#f8fafc' stroke='#e2e8f0'/><text x='480' y='132' font-family='IBM Plex Sans Thai, Outfit, Segoe UI, sans-serif' font-size='17' font-weight='700' fill='#0f172a' text-anchor='middle'>Expectancy = (WinRate × กำไรเฉลี่ย) − (LossRate × ขาดทุนเฉลี่ย)</text><rect x='150' y='228' width='120' height='192' rx='6' fill='#26a69a'/><text x='210.0' y='216.0' font-family='IBM Plex Sans Thai, Outfit, Segoe UI, sans-serif' font-size='15' font-weight='700' fill='#26a69a' text-anchor='middle'>+1,200</text><text x='210.0' y='442' font-family='IBM Plex Sans Thai, Outfit, Segoe UI, sans-serif' font-size='12.5' fill='#64748b' text-anchor='middle'>0.40 × 3,000</text><text x='210.0' y='460' font-family='IBM Plex Sans Thai, Outfit, Segoe UI, sans-serif' font-size='13' font-weight='600' fill='#0f172a' text-anchor='middle'>ฝั่งชนะ</text><rect x='350' y='324' width='120' height='96' rx='6' fill='#ef5350'/><text x='410.0' y='312.0' font-family='IBM Plex Sans Thai, Outfit, Segoe UI, sans-serif' font-size='15' font-weight='700' fill='#ef5350' text-anchor='middle'>−600</text><text x='410.0' y='442' font-family='IBM Plex Sans Thai, Outfit, Segoe UI, sans-serif' font-size='12.5' fill='#64748b' text-anchor='middle'>0.60 × 1,000</text><text x='410.0' y='460' font-family='IBM Plex Sans Thai, Outfit, Segoe UI, sans-serif' font-size='13' font-weight='600' fill='#0f172a' text-anchor='middle'>ฝั่งแพ้</text><text x='325' y='428' font-family='IBM Plex Sans Thai, Outfit, Segoe UI, sans-serif' font-size='30' font-weight='700' fill='#64748b' text-anchor='middle'>−</text><line x1='494.0' y1='350.0' x2='540.0' y2='350.0' stroke='#64748b' stroke-width='2.4'/><path d='M540.0 350.0 L531.7 353.5 L531.7 346.5 Z' fill='#64748b'/><rect x='640' y='250' width='270' height='130' rx='12' fill='#ffffff' stroke='#e2e8f0'/><rect x='640' y='250' width='5' height='130' rx='2' fill='#26a69a'/><text x='656' y='276' font-family='IBM Plex Sans Thai, Outfit, Segoe UI, sans-serif' font-size='15' font-weight='700' fill='#0f172a' text-anchor='start'>ผลลัพธ์ระยะยาว</text><text x='656' y='300' font-family='IBM Plex Sans Thai, Outfit, Segoe UI, sans-serif' font-size='12' fill='#64748b' text-anchor='start'>Expectancy = +600 บาท / ไม้</text><text x='656' y='319' font-family='IBM Plex Sans Thai, Outfit, Segoe UI, sans-serif' font-size='12' fill='#64748b' text-anchor='start'>ทุกครั้งที่กดเทรด (แพ้/ชนะ)</text><text x='656' y='338' font-family='IBM Plex Sans Thai, Outfit, Segoe UI, sans-serif' font-size='12' fill='#64748b' text-anchor='start'>มูลค่าคาดหวัง = +600 เสมอ</text><text x='656' y='357' font-family='IBM Plex Sans Thai, Outfit, Segoe UI, sans-serif' font-size='12' fill='#64748b' text-anchor='start'>→ ไม่ต้องเครียดกับไม้ที่แพ้</text><text x='656' y='376' font-family='IBM Plex Sans Thai, Outfit, Segoe UI, sans-serif' font-size='12' fill='#64748b' text-anchor='start'>วัดผลเป็น R: เสี่ยง 1R ได้ 3R = +3R</text></svg>
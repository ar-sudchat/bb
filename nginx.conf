server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Thai content → force UTF-8 on text responses
    charset utf-8;
    charset_types text/html text/css application/javascript application/json image/svg+xml;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/css application/javascript application/json image/svg+xml application/pdf;

    # $smc_ok / $smc_token are defined in /etc/nginx/conf.d/00-auth.conf,
    # generated at container start (see docker-entrypoint.d/40-basic-auth.sh).

    # ---- Public (no gate) ----
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }
    location = /login.html {
        add_header Cache-Control "no-store, must-revalidate" always;
    }
    location = /favicon.svg {
        add_header Cache-Control "public, max-age=2592000" always;
    }

    # ---- Login check: verify password (Basic Auth) once, then issue a session cookie.
    #      The browser stores this cookie reliably and sends it on every later request. ----
    location = /auth-check {
        auth_basic "SMC Members Only";
        auth_basic_user_file /etc/nginx/.htpasswd;
        add_header Set-Cookie "smc_auth=$smc_token; Path=/; HttpOnly; SameSite=Lax; Max-Age=604800" always;
        add_header Cache-Control "no-store" always;
        return 204;
    }
    # Wrong password (401 from /auth-check) → show the login page, not the browser popup
    error_page 401 = @login;
    location @login { return 302 /login.html; }

    # ---- Everything else: gated by the session cookie ----
    location ~* \.(?:html|js)$ {
        if ($smc_ok = 0) { return 302 /login.html; }
        add_header Cache-Control "no-store, must-revalidate" always;
    }
    location ~* \.(?:png|jpe?g|gif|svg|ico|webp|pdf|woff2?)$ {
        if ($smc_ok = 0) { return 302 /login.html; }
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
    }
    location / {
        if ($smc_ok = 0) { return 302 /login.html; }
        try_files $uri $uri/ /index.html;
    }
}

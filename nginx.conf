server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Thai content → force UTF-8 on text responses
    charset utf-8;
    charset_types text/html text/css application/javascript application/json image/svg+xml;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/css application/javascript application/json image/svg+xml application/pdf;

    # Members-only gate. .htpasswd is generated at container start from
    # BASIC_AUTH_USER / BASIC_AUTH_PASSWORD env (see docker-entrypoint.d).
    auth_basic "SMC Members Only";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Not authenticated → show the pretty login page instead of the browser popup.
    # error_page swaps the 401 (which carries WWW-Authenticate) for a 302, so the
    # native dialog never appears; nginx still enforces auth server-side.
    error_page 401 = @login;
    location @login { return 302 /login.html; }

    # Public (no auth): login page + its icon + health probe
    location = /login.html {
        auth_basic off;
        add_header Cache-Control "no-store, must-revalidate" always;
    }
    location = /favicon.svg {
        auth_basic off;
        add_header Cache-Control "public, max-age=2592000" always;
    }
    location = /health {
        auth_basic off;
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Credential check for the login form. The form sends an XHR with the typed
    # user/pass; correct → 204 (and the browser caches the creds for the realm),
    # wrong → inherits error_page → 302 /login.html (no popup, JS shows error).
    location = /auth-check {
        add_header Cache-Control "no-store" always;
        return 204;
    }

    # HTML & JS: no content hashing → never cache, prevent stale bundle
    location ~* \.(?:html|js)$ {
        add_header Cache-Control "no-store, must-revalidate" always;
    }

    # Media: stable filenames → cache long
    location ~* \.(?:png|jpe?g|gif|svg|ico|webp|pdf|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
